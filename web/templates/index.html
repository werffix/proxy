<!-- web/templates/index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🔗 MTProto Proxy</title>
  <style>
    body { font-family: system-ui; max-width: 500px; margin: 3rem auto; padding: 1rem; }
    input { width: 100%; padding: 0.75rem; margin: 0.5rem 0; border: 1px solid #ccc; border-radius: 6px; }
    button { background: #0088cc; color: #fff; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; cursor: pointer; width: 100%; }
    button:hover { background: #0077b5; }
    .result { margin-top: 1.5rem; padding: 1rem; background: #f0f9ff; border-radius: 8px; display: none; }
    .result.show { display: block; }
    .result.error { background: #fff0f0; color: #c00; }
    code { word-break: break-all; font-size: 0.9em; }
    a { color: #0088cc; word-break: break-all; }
  </style>
</head>
<body>
  <h1>🔐 Получить MTProto прокси</h1>
  <input type="number" id="userId" placeholder="Ваш Telegram User ID" min="1" max="2147483647">
  <input type="password" id="adminToken" placeholder="Admin token (если требуется)" style="display:none">
  <button onclick="getProxy()">🔗 Сгенерировать прокси</button>
  
  <div id="result" class="result">
    <p id="msg"></p>
    <p><a id="link" href="#" target="_blank">📱 Подключить в Telegram</a></p>
    <details><summary>🔍 Показать секрет</summary><code id="secret"></code></details>
  </div>

  <script>
  async function getProxy() {
    const userId = document.getElementById('userId').value;
    const adminToken = document.getElementById('adminToken').value;
    const resBox = document.getElementById('result');
    const msg = document.getElementById('msg');
    const link = document.getElementById('link');
    const secret = document.getElementById('secret');
    
    resBox.classList.remove('show', 'error');
    msg.textContent = '⏳ Генерация...';
    resBox.classList.add('show');
    
    try {
      const resp = await fetch('/api/proxy', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({user_id: parseInt(userId), admin_token: adminToken || null})
      });
      const data = await resp.json();
      
      if (!resp.ok) throw new Error(data.detail || 'Ошибка');
      
      msg.textContent = '✅ Прокси готов!';
      link.href = data.proxy_link;
      link.textContent = data.proxy_link;
      secret.textContent = data.secret;
    } catch (e) {
      msg.textContent = '❌ ' + e.message;
      resBox.classList.add('error');
    }
  }
  </script>
</body>
</html>
